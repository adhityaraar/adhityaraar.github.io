# About Section
about_title: About Me
about_profile_image: images/Adhit_photo.JPG
about_content: |
  Hi, my name is Adhit! In Korea, my friends call me "아디티아 예준" (Aditya Yejun).

  I am a Data and AI Engineer with 7+ years of experience across AI engineering, data science, and product development.
  I specialize in designing and deploying enterprise AI solutions — from generative AI and LLMs on IBM watsonx,
  to MLOps pipelines, fault detection systems, and renewable energy forecasting models.

  I have published 3 peer-reviewed international journal articles on AI applications in the energy sector
  and presented at 7 international conferences. I hold an M.Sc. in Mechanical Engineering (Energy Data Science)
  from Kookmin University, Seoul, and a B.Eng. in Electrical Engineering from the University of Indonesia.

