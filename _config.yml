about_title: About Me
about_profile_image: images/Adhit_photo.JPG
about_content: |
  Hi, my name is Adhit! In Korea, my friends call me "아디티아 예준" (Aditya Yejun).

  I am an AI Engineer with 7+ years of experience helping clients navigate evolving technologies.
  I specialize in designing and deploying end-to-end AI/ML solutions with a strong focus on the
  energy sector, large language models (LLMs), and data-driven decision making.

  I have published 3 peer-reviewed international journal articles on AI applications in the energy
  sector and have presented at 7 international conferences. I hold dual graduate degrees from
  the University of Indonesia and Kookmin University (Seoul, South Korea).

  I thrive at the intersection of research and engineering — translating cutting-edge AI research
  into production-grade systems that deliver real business impact.

